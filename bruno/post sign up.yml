info:
  name: post sign up
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/sign-up"
  headers:
    - name: Authorization
      value: "{{authorization}}"
    - name: correlationId
      value: "{{$randomUUID}}"
  body:
    type: json
    data: |-
      {
        "etmpSafeId": "1234567890",
        "nominatedCompany": {
          "name": "Test Company Ltd PLC",
          "utr": "2233445567",
          "crn": "11223344"
        },
        "contacts": [
          {
            "name": "Jane Doe",
            "email": "jane.doe@example.com",
            "status": "Active",
            "language": "en-GB"
          }
        ]
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
